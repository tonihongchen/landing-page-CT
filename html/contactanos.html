<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>
        <link rel="stylesheet" href="../css/estilo.css">

</head>
<header id="header"></header>
<body>
    <main class="container">
    <section class="form-section">
        <h1>Contáctanos</h1>
        <p>¿Tienes dudas sobre el desafío lógico? Escríbenos.</p>

        <form action="https://formspree.io/f/mgoddzkd" method="POST" class="contact-form">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="name" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="_replyto" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="message" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
            </div>

            <button type="submit" class="btn-primary">ENVIAR MENSAJE</button>
        </form>
    </section>
</main>

    <script src="../js/main.js"></script>
</body>
<footer id="footer"></footer>

</html>
